{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="section-header">
        <div>
            <h2 class="page-title">{{ title }}</h2>
            <p class="muted">Enter the book details to save it in the store.</p>
        </div>
    </div>
    <form method="POST" class="form-card">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary" type="submit">Save Book</button>
    </form>
</div>
{% endblock %}
