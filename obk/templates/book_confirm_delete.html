{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h2 class="page-title">Delete Book</h2>
    <p>Are you sure you want to remove "{{ book.title }}" from the store?</p>
    <div class="actions" style="margin-top: 20px;">
        <form method="POST" style="display:inline;">
            {% csrf_token %}
            <button class="btn btn-primary" type="submit">Yes, delete</button>
        </form>
        <a class="btn btn-secondary" href="{% url 'home' %}">Cancel</a>
    </div>
</div>
{% endblock %}
